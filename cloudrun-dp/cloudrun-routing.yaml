# 1. Serverless NEG Service Definitions (GCP 原生内网路由)
# 注意：在 GKE 中调用 Internal Cloud Run，最佳实践是使用 Serverless NEG，而不是纯 ExternalName。
# 这里我们定义标准 K8s Service，并通过注解绑定到后端的 Cloud Run NEG。
apiVersion: v1
kind: Service
metadata:
  name: cloudrun-svc-1
  annotations:
    cloud.google.com/neg: '{"ingress": true}' # 示意：实际需配置对应的 Serverless NEG
spec:
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: cloudrun-svc-2
  annotations:
    cloud.google.com/neg: '{"ingress": true}' 
spec:
  ports:
  - port: 80
    targetPort: 8080
---
# 2. Ingress Routing (纯内网，不再需要 Host Rewrite 欺骗)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: internal-cloudrun-ingress-1
spec:
  ingressClassName: kong-cloudrun
  rules:
  - host: api.gcp.boss.com
    http:
      paths:
      - path: /run1
        pathType: Prefix
        backend:
          service:
            name: cloudrun-svc-1
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: internal-cloudrun-ingress-2
spec:
  ingressClassName: kong-cloudrun
  rules:
  - host: api.gcp.boss.com
    http:
      paths:
      - path: /run2
        pathType: Prefix
        backend:
          service:
            name: cloudrun-svc-2
            port:
              number: 80
