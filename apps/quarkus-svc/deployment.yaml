apiVersion: apps/v1
kind: Deployment
metadata:
  name: quarkus-svc
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quarkus-svc
  template:
    metadata:
      labels:
        app: quarkus-svc
    spec:
      containers:
      - name: quarkus
        image: ghcr.io/nvd11/my-quarkus-svc:625ba59193396b76230260c3054dd8387ea8cd09
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: quarkus-svc
  namespace: default
spec:
  selector:
    app: quarkus-svc
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
