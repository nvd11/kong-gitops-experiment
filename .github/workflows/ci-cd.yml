name: Quarkus API GitOps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'apps/quarkus-svc/**'
      - '.github/workflows/ci-cd.yml'

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'apps/quarkus-svc/pom.xml'

      - name: Build Quarkus Application with Maven
        run: |
          cd apps/quarkus-svc
          mvn clean package

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          cd apps/quarkus-svc
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME=ghcr.io/$OWNER_LC/my-quarkus-svc
          TAG=${{ github.sha }}
          
          docker build -f src/main/docker/Dockerfile.jvm -t $IMAGE_NAME:$TAG -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:$TAG
          docker push $IMAGE_NAME:latest

      - name: Checkout CD Manifests Repo (Cross-Repo Push)
        uses: actions/checkout@v3
        with:
          repository: nvd11/my-argocd-manifests
          token: ${{ secrets.CD_GIT_PAT }} # 必须在当前仓库配置含有对 CD 库写权限的 PAT 凭证
          path: my-argocd-manifests

      - name: Update Image Tag in ArgoCD App Manifest
        run: |
          cd my-argocd-manifests
          TAG=${{ github.sha }}
          
          # 使用 sed 精准替换 ArgoCD Application 清单中的 tag
          sed -i -E "s/tag: [a-f0-9]+(.*)/tag: ${TAG}\1/g" argocd-apps/quarkus-svc-app.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add argocd-apps/quarkus-svc-app.yaml
          git commit -m "ci: auto-update quarkus-svc image tag to ${TAG} [skip ci]" || echo "No changes to commit"
          git push
